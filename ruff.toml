# Ruff config — quick checkstyle for repo Python.
# Vendored/benchmark Python is excluded: QuixBugs fixtures are intentionally
# imperfect test data, and .benchmarks is gitignored. Ruff here is mainly
# forward-looking (future Python scripts/adapters); the repair harness Python
# is generated at runtime inside the sandbox, not committed.
target-version = "py311"
extend-exclude = ["tests/fixtures", ".benchmarks"]

[lint]
select = ["E", "F", "I"]  # pycodestyle errors, pyflakes, import sorting
